services:
  postgres:
    image: postgres:15-alpine
    container_name: clipforge-postgres
    environment:
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge123
      POSTGRES_DB: clipforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clipforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: clipforge-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://clipforge:clipforge123@postgres:5432/clipforge
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-super-secret-key-change-in-production
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    container_name: clipforge-celery
    environment:
      - DATABASE_URL=postgresql://clipforge:clipforge123@postgres:5432/clipforge
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-super-secret-key-change-in-production
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.video_tasks worker --loglevel=info --pool=solo

  frontend:
    build: ./frontend
    container_name: clipforge-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=9v9KCTp4dPBej9blbxkZYAEz5lh4GFtgUkVyNuD98TQ=
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: